name: Build and Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Job 1: Build for Linux
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest # Use Ubuntu Linux runner

    steps:
      # Step 1: Download your repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Rust toolchain
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      # Step 3: Cache Rust dependencies to speed up builds
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      # Step 4: Build the release binary
      - name: Build release binary
        run: cargo build --release --locked

      # Step 5: Compress the binary
      - name: Create archive
        run: |
          cd target/release
          tar -czf CrabShield-linux-x86_64.tar.gz CrabShield
          cd ../..

      # Step 6: Upload artifact for the release job
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: target/release/CrabShield-linux-x86_64.tar.gz

  # Job 2: Build for Windows
  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest # Use Windows runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --locked

      # Windows creates .exe files
      - name: Create archive
        run: |
          cd target/release
          Compress-Archive -Path CrabShield.exe -DestinationPath CrabShield-windows-x86_64.zip
          cd ../..
        shell: powershell

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: target/release/CrabShield-windows-x86_64.zip

  # Job 3: Create GitHub Release
  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows] # Wait for build jobs to complete
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download the artifacts from build jobs
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: ./artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: ./artifacts

      # Create the GitHub release and upload binaries
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./artifacts/CrabShield-linux-x86_64.tar.gz
            ./artifacts/CrabShield-windows-x86_64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
